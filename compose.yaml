services:
  dashboard:
    build:
      context: .
    image: docker-model-runner-dashboard:local
    init: true
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8787}:8787"
    environment:
      NODE_ENV: production
      PORT: 8787
      MODEL_RUNNER_URL: ${MODEL_RUNNER_URL:-http://model-runner.docker.internal}
